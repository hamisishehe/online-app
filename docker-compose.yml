services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onlineapplication
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5532:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onlineapplication"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/onlineapplication?schema=public
      SESSION_SECRET: abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890abcdefghijklmnopqrstuvwxyz1234567890
      SESSION_COOKIE_SECURE: "false"
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3005
      ALLOWED_DEV_ORIGINS: localhost,127.0.0.1,41.59.57.5
      SERVER_ACTIONS_ALLOWED_ORIGINS: localhost:3005,127.0.0.1:3005,41.59.57.5:3005
      UPLOAD_DIR: /app/public/uploads
      UPLOAD_PUBLIC_BASE: /uploads
    ports:
      - "3005:3005"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  db_data:
  uploads:
