services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onlineapplication
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5532:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d onlineapplication"]
      interval: 5s
      timeout: 5s
      retries: 20

  app:
    build: .
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/onlineapplication?schema=public
      SESSION_SECRET: change_me_in_prod
      NODE_ENV: production
    ports:
      - "3005:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/public/uploads

volumes:
  db_data:
  uploads:
